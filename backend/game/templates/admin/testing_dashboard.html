<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Testing Dashboard - Load Test</title>
          <style>
                    * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                    }

                    body {
                              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                              background: #ffffff;
                              min-height: 100vh;
                              display: flex;
                              color: #2d3748;
                    }

                    .sidebar {
                              width: 260px;
                              background: #0f172a;
                              height: 100vh;
                              position: fixed;
                              left: 0;
                              top: 0;
                              display: flex;
                              flex-direction: column;
                              z-index: 1000;
                    }

                    .sidebar-header {
                              padding: 24px 20px;
                              border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                              background: #0f172a;
                    }

                    .sidebar-header .logo {
                              display: flex;
                              align-items: center;
                              gap: 8px;
                              color: white;
                              font-size: 20px;
                              font-weight: 700;
                    }

                    .main-content {
                              margin-left: 260px;
                              flex: 1;
                              padding: 32px;
                              min-height: 100vh;
                              width: calc(100% - 260px);
                              background: #f7fafc;
                    }

                    .container {
                              max-width: 1200px;
                              margin: 0 auto;
                    }

                    .header {
                              margin-bottom: 32px;
                              display: flex;
                              justify-content: space-between;
                              align-items: center;
                    }

                    .header h1 {
                              font-size: 28px;
                              font-weight: 700;
                              color: #1a202c;
                    }

                    .card {
                              background: white;
                              padding: 24px;
                              border-radius: 12px;
                              box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                              border: 1px solid #e2e8f0;
                              margin-bottom: 24px;
                    }

                    .card-title {
                              font-size: 18px;
                              font-weight: 700;
                              color: #2d3748;
                              margin-bottom: 20px;
                    }

                    .form-group {
                              margin-bottom: 20px;
                    }

                    label {
                              display: block;
                              margin-bottom: 8px;
                              font-size: 14px;
                              font-weight: 600;
                              color: #4a5568;
                    }

                    input {
                              width: 100%;
                              padding: 10px 12px;
                              border: 1px solid #e2e8f0;
                              border-radius: 8px;
                              font-size: 16px;
                    }

                    .btn {
                              padding: 12px 24px;
                              border-radius: 8px;
                              font-weight: 600;
                              cursor: pointer;
                              border: none;
                              transition: all 0.2s;
                              font-size: 15px;
                    }

                    .btn-primary {
                              background: #007bff;
                              color: white;
                    }

                    .btn-danger {
                              background: #dc3545;
                              color: white;
                    }

                    .stats-grid {
                              display: grid;
                              grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                              gap: 20px;
                    }

                    .stat-item {
                              padding: 16px;
                              background: #f8fafc;
                              border-radius: 8px;
                              border: 1px solid #edf2f7;
                    }

                    .stat-label {
                              font-size: 12px;
                              color: #718096;
                              text-transform: uppercase;
                              font-weight: 600;
                              margin-bottom: 4px;
                    }

                    .stat-value {
                              font-size: 20px;
                              font-weight: 700;
                              color: #1a202c;
                    }

                    .feed-container {
                              max-height: 400px;
                              overflow-y: auto;
                              background: #1a202c;
                              color: #edf2f7;
                              padding: 16px;
                              font-family: 'Courier New', Courier, monospace;
                              font-size: 13px;
                              border-radius: 8px;
                    }

                    .feed-item {
                              margin-bottom: 4px;
                              padding-bottom: 4px;
                              border-bottom: 1px solid #2d3748;
                    }

                    .error {
                              color: #fc8181;
                    }

                    .success {
                              color: #68d391;
                    }

                    .pulse {
                              animation: pulse-animation 2s infinite;
                    }

                    @keyframes pulse-animation {
                              0% {
                                        opacity: 1;
                              }

                              50% {
                                        opacity: 0.5;
                              }

                              100% {
                                        opacity: 1;
                              }
                    }
          </style>
</head>

<body>
          <div class="sidebar">
                    <div class="sidebar-header">
                              <div class="logo"><span>🎲🎲</span><span>Gundu ata</span></div>
                    </div>
                    {% include 'admin/_sidebar_menu.html' %}
          </div>
          <div class="main-content">
                    <div class="container">
                              <div class="header">
                                        <h1>Testing Dashboard</h1>
                                        <div id="status-indicator">
                                                  <span id="running-badge" style="display: none;" class="pulse">🔴
                                                            Simulation Running</span>
                                        </div>
                              </div>
                              <div class="grid" style="display: grid; grid-template-columns: 1fr 2fr; gap: 24px;">
                                        <div class="card">
                                                  <div class="card-title">Simulation Controls</div>
                                                  <form id="simulation-form">
                                                            <div class="form-group">
                                                                      <label>User Count (Current RPS: <span
                                                                                          id="rps-val">300</span>)</label>
                                                                      <input type="number" id="user-count" value="300"
                                                                                min="1" max="1000"
                                                                                onchange="document.getElementById('rps-val').innerText=this.value">
                                                            </div>
                                                            <div class="form-group">
                                                                      <label>Bets per User</label>
                                                                      <input type="number" id="bets-per-user" value="10"
                                                                                min="1" max="1000">
                                                            </div>
                                                            <div class="form-group">
                                                                      <label>Chip Amount</label>
                                                                      <input type="number" id="chip-amount" value="10"
                                                                                min="1">
                                                            </div>
                                                            <div style="display: flex; gap: 12px;">
                                                                      <button type="submit" id="start-btn"
                                                                                class="btn btn-primary"
                                                                                style="flex: 1;">Start Pulse</button>
                                                                      <button type="button" id="stop-btn"
                                                                                class="btn btn-danger"
                                                                                style="display: none; flex: 1;">Stop
                                                                                Pulse</button>
                                                            </div>
                                                  </form>
                                        </div>
                                        <div class="card">
                                                  <div class="card-title">Real-time Performance</div>
                                                  <div class="stats-grid">
                                                            <div class="stat-item">
                                                                      <div class="stat-label">Total Requests</div>
                                                                      <div class="stat-value" id="stat-total">0</div>
                                                            </div>
                                                            <div class="stat-item">
                                                                      <div class="stat-label">Success Rate</div>
                                                                      <div class="stat-value" id="stat-rate">100%</div>
                                                            </div>
                                                            <div class="stat-item">
                                                                      <div class="stat-label">Avg Latency</div>
                                                                      <div class="stat-value" id="stat-avg">0ms</div>
                                                            </div>
                                                            <div class="stat-item">
                                                                      <div class="stat-label">Failures</div>
                                                                      <div class="stat-value error" id="stat-fails">0
                                                                      </div>
                                                            </div>
                                                  </div>
                                        </div>
                              </div>
                              <div class="card">
                                        <div class="card-title">Live Log Feed</div>
                                        <div id="log-feed" class="feed-container">
                                                  <div class="feed-item">System ready. Enter params and click 'Start
                                                            Pulse'.</div>
                                        </div>
                              </div>
                    </div>
          </div>
          <script>
                    const form = document.getElementById('simulation-form');
                    const startBtn = document.getElementById('start-btn');
                    const stopBtn = document.getElementById('stop-btn');
                    const runningBadge = document.getElementById('running-badge');
                    const logFeed = document.getElementById('log-feed');
                    let statusInterval = null;

                    function addLog(message, type = '') {
                              const item = document.createElement('div');
                              item.className = 'feed-item ' + type;
                              item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                              logFeed.prepend(item);
                              if (logFeed.children.length > 100) logFeed.removeChild(logFeed.lastChild);
                    }

                    function updateStats() {
                              fetch('{% url "simulation_status" %}')
                                        .then(res => res.json())
                                        .then(data => {
                                                  document.getElementById('stat-total').textContent = data.total_requests;
                                                  const rate = data.total_requests > 0 ? ((data.success_count / data.total_requests) * 100).toFixed(1) : 100;
                                                  document.getElementById('stat-rate').textContent = rate + '%';
                                                  document.getElementById('stat-avg').textContent = (data.avg_response_time * 1000).toFixed(0) + 'ms';
                                                  document.getElementById('stat-fails').textContent = data.failure_count;

                                                  if (data.is_running) {
                                                            startBtn.style.display = 'none';
                                                            stopBtn.style.display = 'block';
                                                            runningBadge.style.display = 'inline';
                                                  } else {
                                                            startBtn.style.display = 'block';
                                                            stopBtn.style.display = 'none';
                                                            runningBadge.style.display = 'none';
                                                            if (statusInterval && !data.is_running) {
                                                                      clearInterval(statusInterval);
                                                                      statusInterval = null;
                                                                      addLog('Simulation stopped or completed.', 'success');
                                                            }
                                                  }
                                                  if (data.recent_errors) data.recent_errors.forEach(err => addLog(err, 'error'));
                                        });
                    }

                    form.onsubmit = (e) => {
                              e.preventDefault();
                              const payload = {
                                        user_count: document.getElementById('user-count').value,
                                        bets_per_user: document.getElementById('bets-per-user').value,
                                        chip_amount: document.getElementById('chip-amount').value
                              };
                              fetch('{% url "start_simulation" %}', {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                                        body: JSON.stringify(payload)
                              }).then(res => res.json()).then(data => {
                                        if (data.status === 'started') {
                                                  addLog('Simulation started: ' + payload.user_count + ' users @ 1 bet/sec.', 'success');
                                                  if (!statusInterval) statusInterval = setInterval(updateStats, 1000);
                                        } else addLog('Error: ' + data.error, 'error');
                              });
                    };

                    stopBtn.onclick = () => {
                              fetch('{% url "stop_simulation" %}', { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } })
                                        .then(() => { addLog('Stop signal sent.'); updateStats(); });
                    };

                    setInterval(updateStats, 2000);
          </script>
</body>

</html>
