<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password - Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
        }
        .login-header { text-align: center; margin-bottom: 24px; }
        .login-header h1 { color: #1a202c; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .login-header p { color: #718096; font-size: 14px; line-height: 1.6; }
        .back-link { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #e2e8f0; }
        .back-link a { color: #667eea; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Forgot password?</h1>
            <p>To reset your admin panel password, please contact your Super Admin. They can reset it from Worker Management or by using the database admin.</p>
        </div>
        <div class="back-link">
            <a href="{% url 'admin_login' %}">← Back to Login</a>
        </div>
    </div>
</body>
</html>
