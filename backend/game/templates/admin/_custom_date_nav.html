{% comment %}Custom date dropdown for top nav / sidebar. Form goes to Reports with from_date, to_date.{% endcomment %}
<div class="custom-date-nav-wrap" style="margin-bottom: 8px;">
    <button type="button" id="custom-date-toggle" class="custom-date-toggle" style="width: 100%; text-align: left; padding: 12px 20px; background: rgba(102, 126, 234, 0.2); border: 1px solid rgba(102, 126, 234, 0.4); border-radius: 8px; color: #e2e8f0; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;">
        <span>📅</span> Custom date
    </button>
    <div id="custom-date-panel" style="display: none; padding: 14px 16px; margin-top: 6px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;">
        <form method="get" action="{% url 'admin_transactions' %}" style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-size: 12px; color: rgba(255,255,255,0.8);">Start date</label>
            <input type="date" name="from_date" id="nav-from-date" style="padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: #1e293b; color: #fff; font-size: 13px;" />
            <label style="font-size: 12px; color: rgba(255,255,255,0.8);">End date</label>
            <input type="date" name="to_date" id="nav-to-date" style="padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: #1e293b; color: #fff; font-size: 13px;" />
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <button type="submit" style="padding: 8px 14px; background: #667eea; color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;">Apply</button>
                <a href="{% url 'admin_transactions' %}?overall=1" style="padding: 8px 14px; background: #64748b; color: white; border-radius: 6px; font-size: 13px; text-decoration: none; display: inline-block;">Overall (all)</a>
            </div>
        </form>
    </div>
</div>
<script>
(function() {
    var toggle = document.getElementById('custom-date-toggle');
    var panel = document.getElementById('custom-date-panel');
    if (toggle && panel) {
        toggle.addEventListener('click', function() {
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        });
    }
})();
</script>
