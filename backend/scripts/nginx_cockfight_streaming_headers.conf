# Cockfight round videos must NOT be served as public static files under /media/.
# Use Django → GET /api/game/meron-wala/video-stream/?token=... (signed URL from authenticated API).
#
# Block direct browser access to uploaded files (recommended for production):
#
#   location /media/cockfight_videos/ {
#       deny all;
#       return 403;
#   }
#
# ---
# Legacy optional block if you ever need nginx to serve bytes with headers (avoid if using deny above):
# Use a *more specific* path than the parent /media/ so it takes precedence, and set `alias`
# to the real `cockfight_videos` directory on disk (same as Django MEDIA_ROOT).
#
#   location /media/cockfight_videos/ {
#       alias /home/fight/backend/media/cockfight_videos/;   # fix this path
#       add_header Content-Disposition "inline" always;
#       add_header X-Content-Type-Options "nosniff" always;
#       types { video/mp4 mp4 m4v; video/webm webm; video/quicktime mov; }
#   }
#
# After editing: `nginx -t && nginx -s reload`
