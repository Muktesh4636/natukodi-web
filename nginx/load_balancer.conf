# Nginx Load Balancer Configuration
# Deploy on 187.77.186.84 (gunduata.club DNS) or on Server 1 (72.61.254.71)
# Backends: 71, 74, 41 (app on port 8001)

upstream backend_servers {
    least_conn;
    server 72.61.254.71:8001 max_fails=3 fail_timeout=30s;
    server 72.61.254.74:8001 max_fails=3 fail_timeout=30s;
    server 72.62.226.41:8001 max_fails=3 fail_timeout=30s;
}

# WebSocket: sticky by IP so long-lived connections stay on one backend
upstream backend_ws {
    ip_hash;
    server 72.61.254.71:8001 max_fails=3 fail_timeout=30s;
    server 72.61.254.74:8001 max_fails=3 fail_timeout=30s;
    server 72.62.226.41:8001 max_fails=3 fail_timeout=30s;
}

# WebSocket upgrade configuration
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

    server {
        listen 80;
        server_name gunduata.club www.gunduata.club gunduata.online www.gunduata.online;

        # Root = WebGL (frontend at / requires frontend deployed to /var/www/gunduata.club/frontend)
        root /var/www/gunduata.club/website;
        index index.html;

        client_max_body_size 20M;

        # Increase timeouts for WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # WebSocket support (sticky upstream so connection stays on one backend)
        location /ws/ {
            proxy_pass http://backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Django API, admin, static, media → backend
        location /api/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
        location /admin/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
        # Game admin — MUST hit backend (not frontend). ^~ = prefer over prefix /
        location ^~ /game-admin {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
        # WebGL under /webgl/ + relative "api/..." → /webgl/api/... was 404 from static alias; proxy to Django
        location ^~ /webgl/api/ {
            rewrite ^/webgl/api/(.*)$ /api/$1 break;
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
        location /static/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        # Media is local disk per app server; LB round-robins. Retry other backends on 404/502 so
        # deposit_screenshots/... works when the file exists on another node (until shared storage).
        location /media/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_404 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Unity WebGL precompressed: Content-Encoding + gzip off (avoid double-compress)
        location ~* ^/Build/.+\.gz$ {
            root /var/www/gunduata.club/website;
            gzip off;
            add_header Content-Encoding gzip;
            default_type application/octet-stream;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }
        location ~* ^/Build/.+\.br$ {
            root /var/www/gunduata.club/website;
            gzip off;
            add_header Content-Encoding br;
            default_type application/octet-stream;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }
        location ~* ^/webgl/Build/.+\.gz$ {
            rewrite ^/webgl/(.*)$ /$1 break;
            root /var/www/gunduata.club/website;
            gzip off;
            add_header Content-Encoding gzip;
            default_type application/octet-stream;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }
        location ~* ^/webgl/Build/.+\.br$ {
            rewrite ^/webgl/(.*)$ /$1 break;
            root /var/www/gunduata.club/website;
            gzip off;
            add_header Content-Encoding br;
            default_type application/octet-stream;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }

        # WebGL at /webgl/ (no ^~ so /webgl/Build/*.gz matches regex above)
        location /webgl/ {
            alias /var/www/gunduata.club/website/;
            index index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Main: serve WebGL so no 500; when frontend exists at .../frontend, change root to that and /html
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }

