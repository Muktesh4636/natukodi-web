# Nginx Load Balancer Configuration
# Deploy this on Server 1 or a separate server

upstream backend_servers {
    # Load balancing method: least_conn (distributes to server with fewest connections)
    least_conn;
    
    # Server 1 - App Server
    server 72.61.254.71:8001 max_fails=3 fail_timeout=30s;
    
    # Server 2 - App Server  
    server 72.61.254.74:8001 max_fails=3 fail_timeout=30s;
    
    # Health check: if a server fails 3 times in 30s, mark as down for 30s
}

# WebSocket upgrade configuration
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

    server {
        listen 80;
        server_name gunduata.online www.gunduata.online;
        
        client_max_body_size 20M;
        
        # Increase timeouts for WebSocket
    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;
    
    # WebSocket support
    location /ws/ {
        proxy_pass http://backend_servers;
        proxy_http_version 1.1;
        
        # WebSocket headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Disable buffering for real-time WebSocket
        proxy_buffering off;
    }
    
    # API and static files
    location / {
        proxy_pass http://backend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
