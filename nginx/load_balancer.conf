# Nginx Load Balancer Configuration
# Deploy on 187.77.186.84 (gunduata.club DNS) or on Server 1 (72.61.254.71)
# Backends: 71, 74, 41 (app on port 8001)

upstream backend_servers {
    least_conn;
    server 72.61.254.71:8001 max_fails=3 fail_timeout=30s;
    server 72.61.254.74:8001 max_fails=3 fail_timeout=30s;
    server 72.62.226.41:8001 max_fails=3 fail_timeout=30s;
}

# WebSocket: sticky by IP so long-lived connections stay on one backend
upstream backend_ws {
    ip_hash;
    server 72.61.254.71:8001 max_fails=3 fail_timeout=30s;
    server 72.61.254.74:8001 max_fails=3 fail_timeout=30s;
    server 72.62.226.41:8001 max_fails=3 fail_timeout=30s;
}

# WebSocket upgrade configuration
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

    server {
        listen 80;
        server_name gunduata.club www.gunduata.club gunduata.online www.gunduata.online;

        # Frontend = repo frontend--2/ (main page: frontend--2/html)
        root /root/apk_of_ata/frontend--2;
        index html;

        client_max_body_size 20M;

        # Increase timeouts for WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;

        # WebSocket support (sticky upstream so connection stays on one backend)
        location /ws/ {
            proxy_pass http://backend_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # Django API, admin, static, media → backend
        location /api/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
        location /admin/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
        # Game admin (dashboard + /game-admin/admin/ -> Django admin)
        location /game-admin/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
        location /static/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        location /media/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 7d;
            add_header Cache-Control "public";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Frontend: serve static files and fallback to /html (main page)
        location / {
            try_files $uri $uri/ /html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }
    }

# HTTPS server block — same locations as port 80 so /game-admin/ works for https://
server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name gunduata.club www.gunduata.club gunduata.online www.gunduata.online;

        ssl_certificate /etc/letsencrypt/live/gunduata.club/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gunduata.club/privkey.pem;
