# HTTP server - redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name gunduata.club www.gunduata.club;

    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server — frontend (repo frontend/) + Django API/admin/ws
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name gunduata.club www.gunduata.club;

    # Root = WebGL (serves at / and /webgl/)
    root /var/www/gunduata.club/website;
    index index.html;

    client_max_body_size 20M;

    # SSL Certificate paths (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/gunduata.club/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gunduata.club/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # Django API and admin
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Game admin — MUST be proxied to Django (not frontend). ^~ = prefer over prefix / fallback.
    location ^~ /game-admin {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # WebGL hosted under /webgl/ often resolves relative URLs like "api/game/settings/" as
    # /webgl/api/... — that used to hit static alias and return 404. Forward to Django /api/...
    location ^~ /webgl/api/ {
        rewrite ^/webgl/api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Django static (admin/assets)
    location /static/ {
        alias /var/www/gunduata.club/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files — proxy to Django
    location /media/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Unity WebGL precompressed files: tell the client to decompress once; gzip off avoids double-compression
    location ~* ^/Build/.+\.gz$ {
        root /var/www/gunduata.club/website;
        gzip off;
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
    location ~* ^/Build/.+\.br$ {
        root /var/www/gunduata.club/website;
        gzip off;
        add_header Content-Encoding br;
        default_type application/octet-stream;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
    location ~* ^/webgl/Build/.+\.gz$ {
        rewrite ^/webgl/(.*)$ /$1 break;
        root /var/www/gunduata.club/website;
        gzip off;
        add_header Content-Encoding gzip;
        default_type application/octet-stream;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
    location ~* ^/webgl/Build/.+\.br$ {
        rewrite ^/webgl/(.*)$ /$1 break;
        root /var/www/gunduata.club/website;
        gzip off;
        add_header Content-Encoding br;
        default_type application/octet-stream;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }

    # WebGL game at /webgl/ (no ^~ so regex Build rules above can win for /webgl/Build/*.gz)
    location /webgl/ {
        alias /var/www/gunduata.club/website/;
        index index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    # Main (WebGL)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

