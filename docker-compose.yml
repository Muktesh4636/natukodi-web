services:
  # Redis Cache & Channel Layer
  redis:
    image: redis:7-alpine
    container_name: dice_game_redis
    command: redis-server --appendonly yes --requirepass Gunduata@123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Gunduata@123", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - dice_game_network

  # Django Application (Daphne ASGI Server)
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dice_game_web
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn dice_game.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080 --workers 9 --timeout 30 --graceful-timeout 30 --backlog 4096
      "
    volumes:
      - ./backend:/app
      - /var/www/gunduata/static:/app/staticfiles
      - /var/www/gunduata/media:/app/media
      - logs_volume:/app/logs
    ports:
      - "8001:8080"
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=GunduataSecretKey2026_HighScale_Secure
      - USE_SQLITE=${USE_SQLITE:-False}
      - DB_NAME=${DB_NAME:-dice_game}
      - DB_USER=${DB_USER:-muktesh}
      - DB_PASSWORD=${DB_PASSWORD:-Gunduata@123}
      - DB_HOST=72.61.255.231
      - DB_PORT=6432
      - REDIS_HOST=72.61.254.74
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=Gunduata@123
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-2000}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - AUTOBAHN_USE_NVX=0
    # Note: depends_on removed for multi-server setup as redis is on Server 3
    restart: unless-stopped
    networks:
      - dice_game_network
    deploy:
      resources:
        limits:
          cpus: '3.5'
          memory: 12G
        reservations:
          cpus: '1'
          memory: 2G

  # Game Timer Service (runs separately to avoid conflicts)
  game_timer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dice_game_timer
    command: python game_engine_v2.py
    volumes:
      - ./backend:/app
      - logs_volume:/app/logs
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=GunduataSecretKey2026_HighScale_Secure
      - USE_SQLITE=${USE_SQLITE:-False}
      - DB_NAME=${DB_NAME:-dice_game}
      - DB_USER=${DB_USER:-muktesh}
      - DB_PASSWORD=${DB_PASSWORD:-Gunduata@123}
      - DB_HOST=72.61.255.231
      - DB_PORT=6432
      - REDIS_HOST=72.61.254.74
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=Gunduata@123
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-200}
      - AUTOBAHN_USE_NVX=0
    # depends_on removed for multi-server setup
    restart: unless-stopped
    networks:
      - dice_game_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Bet Queue Worker (processes bets from Redis queue to Database)
  bet_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dice_game_bet_worker
    command: python manage.py process_bet_queue
    volumes:
      - ./backend:/app
      - logs_volume:/app/logs
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=GunduataSecretKey2026_HighScale_Secure
      - USE_SQLITE=${USE_SQLITE:-False}
      - DB_NAME=${DB_NAME:-dice_game}
      - DB_USER=${DB_USER:-muktesh}
      - DB_PASSWORD=${DB_PASSWORD:-Gunduata@123}
      - DB_HOST=72.61.255.231
      - DB_PORT=6432
      - REDIS_HOST=72.61.254.74
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=Gunduata@123
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-200}
    # depends_on removed for multi-server setup
    restart: unless-stopped
    networks:
      - dice_game_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  dice_game_network:
    driver: bridge
