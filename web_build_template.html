<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Dice Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-mobile-warning">
        WebGL builds are not supported on mobile devices.
      </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Dice Game</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var mobileWarning = document.querySelector("#unity-mobile-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        div.style.padding = '10px';
        div.style.position = 'absolute';
        div.style.top = '30px';
        div.style.left = '50%';
        div.style.transform = 'translateX(-50%)';
        div.style.background = type == 'error' ? 'red' : 'yellow';
        div.style.color = type == 'error' ? 'white' : 'black';
        div.style.border = '2px solid';
        div.style.borderRadius = '10px';
        div.style.zIndex = 10000;
        warningBanner.appendChild(div);
        if (type != 'error') {
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/WebGL.loader.js";
      var config = {
        dataUrl: buildUrl + "/WebGL.data",
        frameworkUrl: buildUrl + "/WebGL.framework.js",
        codeUrl: buildUrl + "/WebGL.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Dice Game",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Mobile device style: fill the whole browser client area with the game canvas:
      var mobile = /Mobi|Android/i.test(navigator.userAgent);
      if (mobile) {
        container.className = "unity-mobile";
        config.devicePixelRatio = 1; // Mobile devices do not always have a high DPI display
        mobileWarning.style.display = "block";
        setTimeout(() => {
          mobileWarning.style.display = "none";
        }, 5000);
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
          fullscreenButton.onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      // Communication functions for React integration
      window.OnDiceRollComplete = function(results) {
        if (window.parent && window.parent.OnDiceRollComplete) {
          window.parent.OnDiceRollComplete(results);
        }
      };

      window.OnGameStateChanged = function(state) {
        if (window.parent && window.parent.OnGameStateChanged) {
          window.parent.OnGameStateChanged(state);
        }
      };

      window.SendMessageToReact = function(message) {
        if (window.parent && window.parent.SendMessageToReact) {
          window.parent.SendMessageToReact(message);
        }
      };
    </script>
  </body>
</html>
